<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR CƯỜNG | AI Agent Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .user-msg { background: #1e293b; color: white; border-radius: 18px 18px 0 18px; align-self: flex-end; }
        .ai-msg { background: white; color: #1e293b; border-radius: 18px 18px 18px 0; border: 1px solid #e2e8f0; align-self: flex-start; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-screen" class="w-full max-w-md p-10 bg-white rounded-3xl shadow-2xl text-center border border-slate-100">
        <h2 class="text-3xl font-black text-slate-900">MR CƯỜNG</h2>
        <p class="text-slate-500 mt-2 mb-6">Nhập mật khẩu truy cập</p>
        <input type="password" id="pass-input" placeholder="••••••••" class="w-full p-4 border rounded-2xl text-center text-xl mb-4 outline-none focus:border-black">
        <button onclick="checkAuth()" class="w-full bg-black text-white font-bold p-4 rounded-2xl shadow-lg">XÁC THỰC</button>
    </div>

    <div id="chat-screen" class="hidden w-full max-w-3xl bg-white shadow-2xl flex flex-col h-[90vh] rounded-3xl border border-slate-100">
        <div class="p-5 border-b flex justify-between items-center">
            <h3 class="font-bold text-slate-900">MR CƯỜNG AI HUB</h3>
            <button onclick="location.reload()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 bg-[#fcfcfd]">
            <div class="ai-msg p-4 shadow-sm">Chào! Tôi là trợ lý của <b>MR CƯỜNG</b>. Hãy hỏi tôi về AI Agent.</div>
        </div>
        <div class="p-6 border-t flex gap-3">
            <input type="text" id="user-input" placeholder="Hỏi gì đi..." onkeypress="if(event.key==='Enter') sendMessage()" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
            <button onclick="sendMessage()" class="bg-black text-white w-12 h-12 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let chatHistory = []; let userPassword = "";
        function checkAuth() {
            const input = document.getElementById('pass-input').value;
            if (input === "123456") { userPassword = input; document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('chat-screen').classList.remove('hidden'); }
            else { alert("Sai mật khẩu!"); }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="user-msg p-4 shadow-md">${message}</div>`;
            chatHistory.push({ role: "user", content: message });
            inputField.value = '';
            
            const loading = document.createElement('div');
            loading.className = 'ai-msg p-4 italic text-slate-400';
            loading.innerText = 'Đang trả lời...';
            chatBox.appendChild(loading);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory, password: userPassword })
                });

                const data = await response.json();
                console.log("Dữ liệu AI trả về:", data); // KIỂM TRA DỮ LIỆU Ở F12
                chatBox.removeChild(loading);

                if (response.ok && data.choices && data.choices[0]) {
                    const aiReply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="ai-msg p-4 shadow-sm">${aiReply}</div>`;
                    chatHistory.push({ role: "assistant", content: aiReply });
                } else {
                    chatBox.innerHTML += `<div class="ai-msg p-4 text-red-500">Lỗi: ${data.error || "AI không trả lời được"}</div>`;
                }
            } catch (err) {
                if(loading) chatBox.removeChild(loading);
                chatBox.innerHTML += `<div class="ai-msg p-4 text-red-500">Lỗi kết nối.</div>`;
                console.error(err);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
