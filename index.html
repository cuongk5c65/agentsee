<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MR CƯỜNG AI HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .user-msg { background: #1e293b; color: white; border-radius: 15px 15px 0 15px; align-self: flex-end; }
        .ai-msg { background: white; border: 1px solid #e2e8f0; border-radius: 15px 15px 15px 0; align-self: flex-start; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div id="auth" class="bg-white p-8 rounded-3xl shadow-xl text-center w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-4">MR CƯỜNG</h2>
        <input type="password" id="pw" placeholder="Mật khẩu..." class="w-full p-3 border rounded-xl mb-4 text-center outline-none">
        <button onclick="login()" class="w-full bg-black text-white p-3 rounded-xl font-bold">XÁC THỰC</button>
    </div>

    <div id="chat" class="hidden w-full max-w-2xl bg-white shadow-2xl rounded-3xl flex flex-col h-[85vh] overflow-hidden">
        <div class="p-4 border-b font-bold text-center bg-slate-50">MR CƯỜNG AI HUB</div>
        <div id="box" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-slate-50">
            <div class="ai-msg p-3 shadow-sm">Chào! Tôi đã sẵn sàng.</div>
        </div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="in" placeholder="Hỏi AI..." class="flex-1 p-3 border rounded-xl outline-none">
            <button onclick="send()" class="bg-black text-white px-6 rounded-xl">GỬI</button>
        </div>
    </div>

    <script>
        let h = []; let p = "";
        function login() { p = document.getElementById('pw').value; if(p==="123456"){ document.getElementById('auth').classList.add('hidden'); document.getElementById('chat').classList.remove('hidden'); } else alert("Sai!"); }
        
        async function send() {
            const input = document.getElementById('in'); const val = input.value; if(!val) return;
            const box = document.getElementById('box');
            box.innerHTML += `<div class="user-msg p-3 shadow-sm">${val}</div>`;
            h.push({role:"user", content:val}); input.value = ''; box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: h, password: p })
                });
                const data = await res.json();
                if (res.ok) {
                    const txt = data.choices[0].message.content;
                    box.innerHTML += `<div class="ai-msg p-3 shadow-sm">${txt}</div>`;
                    h.push({role:"assistant", content:txt});
                } else {
                    // HIỂN THỊ LỖI DƯỚI DẠNG CHỮ (KHÔNG HIỆN [OBJECT OBJECT])
                    const errorTxt = typeof data.error === 'object' ? JSON.stringify(data.error) : data.error;
                    box.innerHTML += `<div class="ai-msg p-3 text-red-500">Lỗi: ${errorTxt}</div>`;
                }
            } catch (err) { box.innerHTML += `<div class="ai-msg p-3 text-red-500">Lỗi kết nối!</div>`; }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
