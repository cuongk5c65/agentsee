<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR CƯỜNG | AI EXPERT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            min-height: 100vh;
            color: #2d3748;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .icon-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
        }

        .user-bubble {
            background: #4a90e2;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .ai-bubble {
            background: white;
            color: #2d3748;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #edf2f7;
        }

        .input-shadow {
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .loading-dot {
            width: 5px; height: 5px; background: #a0aec0;
            border-radius: 50%; animation: blink 1.4s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="auth-screen" class="w-full max-w-sm p-10 glass-card rounded-[2.5rem] text-center animate-fade-in">
        <div class="mb-8">
            <!-- Icon Cặp Kính trong khung bo góc xịn -->
            <div class="w-20 h-20 icon-box rounded-[2rem] flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-glasses text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">MR CƯỜNG</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium tracking-wide">Vui lòng nhập mật khẩu</p>
        </div>
        
        <div class="space-y-5">
            <input type="password" id="pass-input" placeholder="••••••" 
                class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-center focus:ring-2 focus:ring-indigo-400 outline-none transition-all text-xl tracking-widest text-slate-700">
            
            <button onclick="checkAuth()" 
                class="w-full bg-slate-800 text-white font-bold p-4 rounded-2xl hover:bg-slate-900 transition-all active:scale-95 shadow-lg shadow-slate-200">
                ĐĂNG NHẬP
            </button>
        </div>
    </div>

    <!-- GIAO DIỆN CHAT -->
    <div id="chat-screen" class="hidden w-full max-w-4xl h-[90vh] glass-card flex flex-col rounded-[2.5rem] overflow-hidden">
        <!-- Header -->
        <div class="p-6 bg-white/50 border-b border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 icon-box rounded-2xl flex items-center justify-center text-white">
                    <i class="fa-solid fa-glasses text-xl"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-slate-800">MR CƯỜNG AI EXPERT</h2>
                    <p class="text-[10px] text-indigo-500 font-bold tracking-widest uppercase italic">Secure Connection Active</p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 rounded-full hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[#f8fafc]/50">
            <div class="ai-bubble p-5 text-slate-700 max-w-[85%] shadow-sm">
                Chào chuyên gia! Tôi là trợ lý AI chuyên biệt của <b>MR CƯỜNG</b>. Hệ thống đã sẵn sàng, mời bạn đặt câu hỏi về AI & AI Agent.
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-white/80">
            <div class="relative flex items-center gap-4">
                <input type="text" id="user-input" placeholder="Hỏi gì đi..." onkeypress="if(event.key==='Enter') sendMessage()" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all input-shadow">
                <button onclick="sendMessage()" class="bg-indigo-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center hover:bg-indigo-600 transition-all shadow-md active:scale-90">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = []; let userPassword = "";

        function checkAuth() {
            const input = document.getElementById('pass-input').value;
            if (input === "123456") {
                userPassword = input;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').classList.remove('hidden');
            } else { 
                alert("Mật khẩu không đúng!"); 
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="flex justify-end"><div class="user-bubble p-4 shadow-sm">${message}</div></div>`;
            chatHistory.push({ role: "user", content: message });
            inputField.value = '';
            
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `
                <div id="${loadingId}" class="ai-bubble p-5 self-start flex gap-1.5 items-center">
                    <div class="loading-dot"></div><div class="loading-dot" style="animation-delay:0.2s"></div><div class="loading-dot" style="animation-delay:0.4s"></div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory, password: userPassword })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const aiReply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="flex justify-start"><div class="ai-bubble p-5 shadow-sm">${aiReply}</div></div>`;
                    chatHistory.push({ role: "assistant", content: aiReply });
                } else {
                    chatBox.innerHTML += `<div class="p-4 text-red-500 bg-red-50 rounded-xl">Lỗi hệ thống: ${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="p-4 text-red-500">Lỗi kết nối.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
