<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Expert | Secure Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .chat-container { height: calc(100vh - 180px); }
        .message-bubble { max-width: 85%; transition: all 0.2s ease-in-out; }
        .user-msg { background: #2563eb; color: white; border-radius: 18px 18px 0 18px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .ai-msg { background: white; color: #1e293b; border-radius: 18px 18px 18px 0; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        .loading-dot { animation: wave 1.2s infinite; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen">

    <!-- Màn hình khóa (Login) -->
    <div id="auth-screen" class="w-full max-w-md p-8 bg-white rounded-2xl shadow-2xl text-center border border-slate-100">
        <div class="mb-6">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-shield-halved text-blue-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Xác thực Chuyên gia</h2>
            <p class="text-slate-500 mt-2">Vui lòng nhập mã truy cập bảo mật</p>
        </div>
        <input type="password" id="pass-input" placeholder="Mã truy cập (123456)..." class="w-full p-4 border border-slate-200 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-4 rounded-xl shadow-lg transition-all active:scale-95">Mở khóa Hệ thống</button>
    </div>

    <!-- Màn hình Chat (Giao diện chuyên nghiệp) -->
    <div id="chat-screen" class="hidden w-full max-w-3xl bg-white shadow-2xl flex flex-col h-screen md:h-[90vh] md:rounded-2xl border border-slate-100">
        <!-- Header -->
        <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-white md:rounded-t-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <i class="fa-solid fa-robot text-xl"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800">AI Agent Expert</h3>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Hệ thống đang sẵn sàng</span>
                    </div>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-power-off text-lg"></i></button>
        </div>

        <!-- Chat Box -->
        <div id="chat-box" class="chat-container flex-1 overflow-y-auto p-6 space-y-6 bg-[#fcfcfd]">
            <div class="ai-msg message-bubble p-4 self-start">
                Chào chuyên gia! Tôi là trợ lý AI chuyên biệt về <b>AI & AI Agent</b>. Hôm nay tôi có thể hỗ trợ gì cho nghiên cứu của bạn?
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-white border-t border-slate-100 md:rounded-b-2xl">
            <div class="relative flex items-center gap-3">
                <input type="text" id="user-input" placeholder="Hỏi về AI Agent, Machine Learning..." onkeypress="if(event.key==='Enter') sendMessage()" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all pr-12">
                <button onclick="sendMessage()" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-blue-700 transition-all shadow-md active:scale-90">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <p class="text-[10px] text-slate-400 text-center mt-3 uppercase tracking-[0.2em]">Hệ thống bảo mật bởi Groq & Vercel</p>
        </div>
    </div>

    <script>
        let chatHistory = []; let userPassword = "";

        function checkAuth() {
            const input = document.getElementById('pass-input').value;
            if (input === "123456") {
                userPassword = input;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
            } else { alert("Sai mã truy cập!"); }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            
            // Add User Message
            chatBox.innerHTML += `<div class="flex justify-end"><div class="user-msg message-bubble p-4 shadow-md animation-fade-in">${message}</div></div>`;
            chatHistory.push({ role: "user", content: message });
            inputField.value = '';
            
            // Add Loading Indicator
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="ai-msg message-bubble p-4 self-start flex gap-1 items-center italic text-slate-400"><span class="loading-dot">•</span><span class="loading-dot" style="animation-delay: 0.2s">•</span><span class="loading-dot" style="animation-delay: 0.4s">•</span> Trợ lý đang suy nghĩ...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory, password: userPassword })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const aiReply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="flex justify-start"><div class="ai-msg message-bubble p-4 border border-slate-100 shadow-sm">${aiReply}</div></div>`;
                    chatHistory.push({ role: "assistant", content: aiReply });
                } else {
                    chatBox.innerHTML += `<div class="flex justify-start"><div class="ai-msg message-bubble p-4 text-red-500 bg-red-50 border-red-100"><b>Lỗi:</b> ${data.error}</div></div>`;
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="flex justify-start"><div class="ai-msg message-bubble p-4 text-red-500 bg-red-50 border-red-100">Lỗi kết nối máy chủ.</div></div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
