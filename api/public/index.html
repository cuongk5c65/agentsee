<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Expert Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #0070f3; text-align: center; }
        #chat-box { height: 350px; border: 1px solid #eee; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 14px; }
        .user { align-self: flex-end; background-color: #0070f3; color: white; }
        .ai { align-self: flex-start; background-color: #e4e6eb; color: #050505; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-screen">
            <h2>🔐 Xác thực người dùng</h2>
            <p style="text-align:center; color:#666;">Vui lòng nhập mật khẩu để hỏi AI Agent</p>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="password" id="pass-input" placeholder="Nhập mật khẩu (123456)...">
                <button onclick="checkAuth()">Đăng nhập</button>
            </div>
        </div>

        <div id="chat-screen" style="display:none;">
            <h2>🤖 AI Agent Expert</h2>
            <div id="chat-box"></div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Hỏi về AI Agent..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let userPassword = "";

        function checkAuth() {
            const input = document.getElementById('pass-input').value;
            if (input === "123456") {
                userPassword = input;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
            } else { alert("Sai mật khẩu rồi!"); }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="msg user"><b>Bạn:</b> ${message}</div>`;
            chatHistory.push({ role: "user", content: message });
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory, password: userPassword })
                });

                const data = await response.json();
                if (response.ok) {
                    const aiReply = data.choices[0].message.content;
                    chatBox.innerHTML += `<div class="msg ai"><b>AI:</b> ${aiReply}</div>`;
                    chatHistory.push({ role: "assistant", content: aiReply });
                } else {
                    chatBox.innerHTML += `<div class="msg ai" style="color:red;">Lỗi: ${data.error}</div>`;
                }
            } catch (err) {
                chatBox.innerHTML += `<div class="msg ai" style="color:red;">Lỗi kết nối máy chủ.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
