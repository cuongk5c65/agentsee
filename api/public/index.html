<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Expert - Bảo Mật</title>
    <style>
        body { font-family: sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #0070f3; text-align: center; }
        #chat-window { height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; font-size: 14px; }
        .u { background: #0070f3; color: white; text-align: right; margin-left: 20%; }
        .a { background: #eee; color: #333; text-align: left; margin-right: 20%; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0070f3; color: white; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="login-box">
        <h2>🔒 Nhập mật khẩu</h2>
        <input type="password" id="pass" placeholder="Mật khẩu là 123456">
        <button onclick="login()">Đăng nhập</button>
    </div>

    <div class="card" id="chat-box" style="display:none;">
        <h2>🤖 AI Agent Expert</h2>
        <div id="chat-window"></div>
        <input type="text" id="userInput" placeholder="Hỏi gì về AI Agent đi..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Gửi câu hỏi</button>
    </div>

    <script>
        let history = []; let pass = "";
        function login() {
            pass = document.getElementById('pass').value;
            if(pass === "123456") {
                document.getElementById('login-box').style.display='none';
                document.getElementById('chat-box').style.display='block';
            } else { alert("Sai mật khẩu!"); }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const win = document.getElementById('chat-window');
            if(!input.value) return;

            win.innerHTML += `<div class="msg u"><b>Bạn:</b> ${input.value}</div>`;
            history.push({ role: "user", content: input.value });
            const currentMsg = input.value;
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history, password: pass })
                });
                const data = await res.json();
                if(res.ok) {
                    const reply = data.choices[0].message.content;
                    win.innerHTML += `<div class="msg a"><b>AI:</b> ${reply}</div>`;
                    history.push({ role: "assistant", content: reply });
                } else {
                    win.innerHTML += `<div style="color:red" class="msg a">Lỗi: ${data.error}</div>`;
                }
            } catch (e) {
                win.innerHTML += `<div style="color:red" class="msg a">Lỗi kết nối server!</div>`;
            }
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
